<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JayenTracker - Login</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@800;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #03060e;
            --border-color: rgba(255, 255, 255, 0.05);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --accent-primary: #3b82f6;
            --table-bg: #0b0b14;
            --row-hover: #111124;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            overflow-x: hidden;
            position: relative;
        }

        /* --- BACKGROUND AURORA --- */
        .bg-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .aurora {
            position: absolute;
            width: 140%;
            height: 140%;
            top: -20%;
            left: -20%;
            background-image: 
                radial-gradient(circle at 15% 25%, rgba(13, 148, 136, 0.12) 0%, transparent 45%),
                radial-gradient(circle at 80% 35%, rgba(37, 99, 235, 0.12) 0%, transparent 45%),
                radial-gradient(circle at 45% 75%, rgba(79, 70, 229, 0.1) 0%, transparent 50%);
            filter: blur(30px);
            mix-blend-mode: screen;
            animation: auroraSlow 25s infinite alternate ease-in-out;
        }

        @keyframes auroraSlow {
            0% { transform: rotate(0deg) scale(1); }
            100% { transform: rotate(45deg) scale(1.05); }
        }

        .content-wrapper {
            max-width: 850px;
            width: 100%;
            z-index: 1;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        /* --- GLITCH TITLE --- */
        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 38px;
            font-weight: 900;
            letter-spacing: -1px;
            margin: 0;
            color: #ffffff;
            position: relative;
            display: inline-block;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        }

        h1::before, h1::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-color);
        }

        h1::before {
            left: 1px;
            text-shadow: -1px 0 rgba(255, 0, 193, 0.5);
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch-anim 6s infinite linear alternate-reverse;
        }

        h1::after {
            left: -1px;
            text-shadow: -1px 0 rgba(0, 255, 249, 0.5);
            clip: rect(85px, 450px, 140px, 0);
            animation: glitch-anim2 6s infinite linear alternate-reverse;
        }

        @keyframes glitch-anim {
            0% { clip: rect(15px, 9999px, 66px, 0); }
            10% { clip: rect(34px, 9999px, 55px, 0); }
            15% { clip: rect(0px, 0px, 0px, 0); }
            100% { clip: rect(0px, 0px, 0px, 0); }
        }

        @keyframes glitch-anim2 {
            0% { clip: rect(65px, 9999px, 110px, 0); }
            10% { clip: rect(5px, 9999px, 40px, 0); }
            15% { clip: rect(0px, 0px, 0px, 0); }
            100% { clip: rect(0px, 0px, 0px, 0); }
        }

        /* --- SCREEN MANAGEMENT --- */
        .view-screen {
            display: none;
        }
        .view-screen.active {
            display: block;
        }

        /* --- CARD & FORM LOGIN --- */
        .login-card {
            max-width: 380px;
            margin: 0 auto;
            background: rgba(11, 11, 20, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 16px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            text-align: center;
        }

        .login-card h2 {
            font-size: 18px;
            margin-top: 0;
            margin-bottom: 20px;
            color: var(--text-main);
            font-weight: 600;
        }

        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }

        .input-group input[type="password"] {
            width: 100%;
            padding: 12px 16px;
            background: #121224;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        .input-group input[type="password"]:focus {
            border-color: var(--accent-primary);
            outline: none;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.2);
        }

        .remember-me-container {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
            font-size: 13px;
            color: var(--text-muted);
            cursor: pointer;
            user-select: none;
        }

        .login-btn {
            width: 100%;
            background: var(--accent-primary);
            color: #fff;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .login-btn:hover {
            background: #2563eb;
        }

        .error-msg {
            color: #ff4a4a;
            font-size: 13px;
            margin-bottom: 15px;
            display: none;
        }

        /* --- STYLING TABLE --- */
        table {
            width: 100%;
            border-collapse: collapse;
            background-color: var(--table-bg);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        th, td {
            padding: 16px 20px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }

        th {
            background-color: #121224;
            color: #a170ff;
            font-weight: 600;
            font-size: 14px;
        }

        tr:hover { background-color: var(--row-hover); }

        .header-align {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            vertical-align: middle;
        }

        .evo-header-logo {
            width: 18px;
            height: 18px;
            object-fit: contain;
        }

        .stone-badge {
            background-color: #2a1640;
            color: #df80ff;
            padding: 5px 12px;
            border-radius: 8px;
            font-weight: bold;
            border: 1px solid #a170ff;
            box-shadow: 0 0 10px rgba(161, 112, 255, 0.3);
        }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: #00ffcc;
            border-radius: 50%;
            margin-right: 8px;
            box-shadow: 0 0 8px #00ffcc;
        }

        .timestamp-text {
            font-size: 13px;
            color: #8c8ca3;
        }
        
        .logout-btn {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-muted);
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            float: right;
            margin-top: 10px;
        }
        .logout-btn:hover {
            color: #fff;
            border-color: #ff4a4a;
        }
    </style>
</head>
<body>

    <div class="bg-wrapper">
        <div class="aurora"></div>
    </div>

    <div class="content-wrapper">
        <header>
            <h1 data-text="JayenTracker">JayenTracker</h1>
        </header>
        
        <!-- --- SCREEN 1: LOGIN --- -->
        <div id="loginScreen" class="view-screen active">
            <div class="login-card">
                <h2>Private Access Only</h2>
                <div id="errorMsg" class="error-msg">Password salah, Jayen!</div>
                <div class="input-group">
                    <input type="password" id="passInput" placeholder="Masukkan Password..." onkeydown="if(event.key==='Enter') handleLogin()">
                </div>
                <label class="remember-me-container">
                    <input type="checkbox" id="rememberMe"> Remember Me
                </label>
                <button class="login-btn" onclick="handleLogin()">Sign In</button>
            </div>
        </div>

        <!-- --- SCREEN 2: DASHBOARD --- -->
        <div id="dashboardScreen" class="view-screen">
            <table>
                <thead>
                    <tr>
                        <th>👤 Player Name</th>
                        <th>
                            <div class="header-align">
                                <img class="evo-header-logo" src="https://raw.githubusercontent.com/jayenco/tracker/main/EVO.png" alt="Evolved Stone">
                                <span>Evolved Enchant Stone</span>
                            </div>
                        </th>
                        <th>🕒 Last Modified</th>
                        <th>🔄 Last Sync</th>
                    </tr>
                </thead>
                <tbody id="accountTableBody">
                    <tr>
                        <td colspan="4" style="text-align: center; color: #5c5c7a; padding: 25px;">Menunggu data executor...</td>
                    </tr>
                </tbody>
            </table>
            <button class="logout-btn" onclick="handleLogout()">Logout</button>
        </div>
    </div>

    <script>
        // --- CONFIG: MODIFIKASI PASSWORD KAMU DI SINI ---
        const TRACKER_PASSWORD = "jayencwokk12958"; 
        
        // Token acak untuk session validasi localStorage
        const AUTH_TOKEN = "session_authorized_secure_jayen";

        let trackerState = {};
        let fetchInterval = null;

        // Cek status login saat halaman pertama kali dimuat
        window.addEventListener('DOMContentLoaded', () => {
            const savedSession = localStorage.getItem('jayen_auth');
            const sessionSession = sessionStorage.getItem('jayen_auth');

            if (savedSession === AUTH_TOKEN || sessionSession === AUTH_TOKEN) {
                showDashboard();
            }
        });

        function handleLogin() {
            const inputVal = document.getElementById('passInput').value;
            const isRememberMe = document.getElementById('rememberMe').checked;
            const errorMsg = document.getElementById('errorMsg');

            if (inputVal === TRACKER_PASSWORD) {
                errorMsg.style.display = "none";
                
                // Simpan status login berdasarkan pilihan "Remember Me"
                if (isRememberMe) {
                    localStorage.setItem('jayen_auth', AUTH_TOKEN);
                } else {
                    sessionStorage.setItem('jayen_auth', AUTH_TOKEN);
                }

                showDashboard();
            } else {
                errorMsg.style.display = "block";
                document.getElementById('passInput').value = "";
            }
        }

        function showDashboard() {
            document.getElementById('loginScreen').classList.remove('active');
            document.getElementById('dashboardScreen').classList.add('active');
            document.title = "JayenTracker - Dashboard";
            
            // Jalankan sinkronisasi data setelah berhasil masuk
            fetchMultiData();
            fetchInterval = setInterval(fetchMultiData, 1000);
        }

        function handleLogout() {
            localStorage.removeItem('jayen_auth');
            sessionStorage.removeItem('jayen_auth');
            clearInterval(fetchInterval);
            
            document.getElementById('dashboardScreen').classList.remove('active');
            document.getElementById('loginScreen').classList.add('active');
            document.getElementById('passInput').value = "";
            document.title = "JayenTracker - Login";
        }

        function formatElapsedTime(pastTime) {
            if (!pastTime) return "-";
            const diffSeconds = Math.floor((new Date() - pastTime) / 1000);
            
            if (diffSeconds < 0 || diffSeconds < 5) return "Just now";
            if (diffSeconds < 60) return `${diffSeconds} sec ago`;
            
            return `${Math.floor(diffSeconds / 60)} min ago`;
        }

        async function fetchMultiData() {
            try {
                const response = await fetch('/api/update-stone');
                const database = await response.json();
                const tbody = document.getElementById('accountTableBody');
                
                if (Object.keys(database).length === 0) return;
                tbody.innerHTML = "";
                
                for (const userId in database) {
                    const account = database[userId];
                    const currentStoneCount = Number(account.totalStone);
                    const currentRawTimestamp = account.timestamp;
                    const now = new Date();

                    if (!trackerState[userId]) {
                        trackerState[userId] = {
                            lastStoneValue: currentStoneCount,
                            lastRawSyncTime: currentRawTimestamp,
                            modifiedRealDate: now,
                            syncRealDate: now
                        };
                    } else {
                        if (trackerState[userId].lastStoneValue !== currentStoneCount) {
                            trackerState[userId].lastStoneValue = currentStoneCount;
                            trackerState[userId].modifiedRealDate = now;
                        }
                        if (trackerState[userId].lastRawSyncTime !== currentRawTimestamp) {
                            trackerState[userId].lastRawSyncTime = currentRawTimestamp;
                            trackerState[userId].syncRealDate = now;
                        }
                    }

                    const displayModified = formatElapsedTime(trackerState[userId].modifiedRealDate);
                    const displaySync = formatElapsedTime(trackerState[userId].syncRealDate);

                    tbody.innerHTML += `
                        <tr>
                            <td><span class="status-dot"></span><strong>${account.username}</strong></td>
                            <td><span class="stone-badge">${currentStoneCount.toLocaleString('id-ID')}</span></td>
                            <td class="timestamp-text">${displayModified}</td>
                            <td class="timestamp-text">${displaySync}</td>
                        </tr>
                    `;
                }
            } catch (err) {
                console.log("Gagal memuat data API.");
            }
        }
    </script>
</body>
</html>
