<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JayenTracker</title>
    <style>
        body {
            background-color: #0f0f1a;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .dashboard {
            background: linear-gradient(145deg, #121222, #1a1a32);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 0 35px rgba(161, 112, 255, 0.2);
            border: 1px solid #2d2d54;
            width: 100%;
            max-width: 850px;
        }

        /* Container Judul */
        .title-container {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 25px;
        }

        /* Teks JayenTracker dengan Efek Glitch Sesuai Request */
        .glitch-title {
            font-size: 32px;
            font-weight: 900;
            color: #ffffff;
            letter-spacing: 1px;
            position: relative;
            text-shadow: 0 0 10px rgba(161, 112, 255, 0.6);
        }

        .glitch-title::before, .glitch-title::after {
            content: "JayenTracker";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .glitch-title::before {
            color: #df80ff;
            animation: glitch-anim 3s infinite linear alternate-reverse;
            clip: rect(44px, 450px, 56px, 0);
            left: 2px;
        }

        .glitch-title::after {
            color: #00ffcc;
            animation: glitch-anim2 2.5s infinite linear alternate-reverse;
            clip: rect(12px, 450px, 32px, 0);
            left: -2px;
        }

        /* Keyframes Glitch 100% Persis Request */
        @keyframes glitch-anim {
            0% { clip: rect(15px, 9999px, 66px, 0); }
            10% { clip: rect(34px, 9999px, 55px, 0); }
            15% { clip: rect(0px, 0px, 0px, 0); }
            100% { clip: rect(0px, 0px, 0px, 0); }
        }

        @keyframes glitch-anim2 {
            0% { clip: rect(65px, 9999px, 110px, 0); }
            10% { clip: rect(5px, 9999px, 40px, 0); }
            15% { clip: rect(0px, 0px, 0px, 0); }
            100% { clip: rect(0px, 0px, 0px, 0); }
        }

        /* Styling Tabel */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            background-color: #0b0b14;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #232342;
        }

        th, td {
            padding: 14px 18px;
            text-align: left;
            border-bottom: 1px solid #1a1a30;
        }

        th {
            background-color: #15152b;
            color: #a170ff;
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 0.5px;
        }

        tr:hover { background-color: #111124; }

        /* Posisi Logo Evolved Enchant Stone Baru (Di Samping Teks TH) */
        .evo-header-logo {
            width: 20px;
            height: 20px;
            vertical-align: middle;
            margin-right: 6px;
            filter: drop-shadow(0 0 4px rgba(223, 128, 255, 0.7));
        }

        /* Badge Angka Ungu */
        .stone-badge {
            background-color: #2a1640;
            color: #df80ff;
            padding: 5px 12px;
            border-radius: 8px;
            font-weight: bold;
            border: 1px solid #a170ff;
            box-shadow: 0 0 10px rgba(161, 112, 255, 0.3);
        }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: #00ffcc;
            border-radius: 50%;
            margin-right: 8px;
            box-shadow: 0 0 8px #00ffcc;
        }

        .timestamp-text {
            font-size: 13px;
            color: #8c8ca3;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="title-container">
            <div class="glitch-title">JayenTracker</div>
        </div>
        
        <table>
            <thead>
                <tr>
                    <th>👤 Player Name</th>
                    <th>
                        <img class="evo-header-logo" src="https://raw.githubusercontent.com/jayenco/tracker/main/EVO.png" alt="Evolved Stone">
                        Evolved Enchant Stone
                    </th>
                    <th>🕒 Last Modified</th>
                    <th>🔄 Last Sync</th>
                </tr>
            </thead>
            <tbody id="accountTableBody">
                <tr>
                    <td colspan="4" style="text-align: center; color: #5c5c7a; padding: 25px;">Menunggu sinkronisasi dari executor Roblox...</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script>
        // State internal browser untuk mencatat riwayat perubahan data secara independen
        let trackerState = {};

        function formatElapsedTime(pastTime) {
            if (!pastTime) return "-";
            const diffSeconds = Math.floor((new Date() - pastTime) / 1000);
            
            if (diffSeconds < 0) return "Just now";
            if (diffSeconds < 5) return "Just now";
            if (diffSeconds < 60) return `${diffSeconds} sec ago`;
            
            const diffMinutes = Math.floor(diffSeconds / 60);
            return `${diffMinutes} min ago`;
        }

        async function fetchMultiData() {
            try {
                const response = await fetch('/api/update-stone');
                const database = await response.json();
                
                const tbody = document.getElementById('accountTableBody');
                if (Object.keys(database).length === 0) return;
                
                tbody.innerHTML = "";
                
                for (const userId in database) {
                    const account = database[userId];
                    const currentStoneCount = Number(account.totalStone);
                    const currentRawTimestamp = account.timestamp;
                    const now = new Date();

                    // Jika akun baru pertama kali terdeteksi di browser
                    if (!trackerState[userId]) {
                        trackerState[userId] = {
                            lastStoneValue: currentStoneCount,
                            lastRawSyncTime: currentRawTimestamp,
                            modifiedRealDate: now,
                            syncRealDate: now
                        };
                    } else {
                        // 1. LOGIKA LAST MODIFIED: Hanya update waktu jika angka batu bertambah / berkurang
                        if (trackerState[userId].lastStoneValue !== currentStoneCount) {
                            trackerState[userId].lastStoneValue = currentStoneCount;
                            trackerState[userId].modifiedRealDate = now;
                        }
                        
                        // 2. LOGIKA LAST SYNC: Update waktu setiap kali data baru dari executor masuk (timestamp berubah)
                        if (trackerState[userId].lastRawSyncTime !== currentRawTimestamp) {
                            trackerState[userId].lastRawSyncTime = currentRawTimestamp;
                            trackerState[userId].syncRealDate = now;
                        }
                    }

                    // Hitung teks elapsennya dinamis (e.g., "5 sec ago")
                    const displayModified = formatElapsedTime(trackerState[userId].modifiedRealDate);
                    const displaySync = formatElapsedTime(trackerState[userId].syncRealDate);

                    const row = `
                        <tr>
                            <td>
                                <span class="status-dot"></span>
                                <strong>${account.username}</strong>
                            </td>
                            <td>
                                <span class="stone-badge">${currentStoneCount.toLocaleString('id-ID')}</span>
                            </td>
                            <td class="timestamp-text">${displayModified}</td>
                            <td class="timestamp-text">${displaySync}</td>
                        </tr>
                    `;
                    tbody.innerHTML += row;
                }
            } catch (err) {
                console.log("Gagal memuat data dari API Vercel.");
            }
        }

        // Jalankan tracking real-time per 1 detik agar counter waktu berjalan mulus
        setInterval(fetchMultiData, 1000);
        fetchMultiData();
    </script>
</body>
</html>
