<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JayenTracker</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@800;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #03060e;
            --border-color: rgba(255, 255, 255, 0.05);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --accent-primary: #3b82f6;
            --table-bg: #0b0b14;
            --row-hover: #111124;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 60px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            overflow-x: hidden;
            position: relative;
        }

        /* --- BACKGROUND AURORA (WARISAN NONTONYUK) --- */
        .bg-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .aurora {
            position: absolute;
            width: 140%;
            height: 140%;
            top: -20%;
            left: -20%;
            background-image: 
                radial-gradient(circle at 15% 25%, rgba(13, 148, 136, 0.12) 0%, transparent 45%),
                radial-gradient(circle at 80% 35%, rgba(37, 99, 235, 0.12) 0%, transparent 45%),
                radial-gradient(circle at 45% 75%, rgba(79, 70, 229, 0.1) 0%, transparent 50%);
            filter: blur(30px);
            mix-blend-mode: screen;
            animation: auroraSlow 25s infinite alternate ease-in-out;
        }

        @keyframes auroraSlow {
            0% { transform: rotate(0deg) scale(1); }
            100% { transform: rotate(45deg) scale(1.05); }
        }

        .content-wrapper {
            max-width: 850px;
            width: 100%;
            z-index: 1;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        /* --- 100% GLITCH JAYENTRACKER (PERSIS NONTONYUK) --- */
        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 38px;
            font-weight: 900;
            letter-spacing: -1px;
            margin: 0;
            color: #ffffff;
            position: relative;
            display: inline-block;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        }

        h1::before, h1::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-color);
        }

        h1::before {
            left: 1px;
            text-shadow: -1px 0 rgba(255, 0, 193, 0.5);
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch-anim 6s infinite linear alternate-reverse;
        }

        h1::after {
            left: -1px;
            text-shadow: -1px 0 rgba(0, 255, 249, 0.5);
            clip: rect(85px, 450px, 140px, 0);
            animation: glitch-anim2 6s infinite linear alternate-reverse;
        }

        @keyframes glitch-anim {
            0% { clip: rect(15px, 9999px, 66px, 0); }
            10% { clip: rect(34px, 9999px, 55px, 0); }
            15% { clip: rect(0px, 0px, 0px, 0); }
            100% { clip: rect(0px, 0px, 0px, 0); }
        }

        @keyframes glitch-anim2 {
            0% { clip: rect(65px, 9999px, 110px, 0); }
            10% { clip: rect(5px, 9999px, 40px, 0); }
            15% { clip: rect(0px, 0px, 0px, 0); }
            100% { clip: rect(0px, 0px, 0px, 0); }
        }

        /* --- STYLING TABLE --- */
        table {
            width: 100%;
            border-collapse: collapse;
            background-color: var(--table-bg);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        th, td {
            padding: 16px 20px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }

        th {
            background-color: #121224;
            color: #a170ff;
            font-weight: 600;
            font-size: 14px;
        }

        tr:hover {
            background-color: var(--row-hover);
        }

        /* Perbaikan Posisi Logo EVO pas di sisi kiri teks */
        .header-align {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            vertical-align: middle;
        }

        .evo-header-logo {
            width: 18px;
            height: 18px;
            object-fit: contain;
        }

        /* Badge Angka Ungu Menyala */
        .stone-badge {
            background-color: #2a1640;
            color: #df80ff;
            padding: 5px 12px;
            border-radius: 8px;
            font-weight: bold;
            border: 1px solid #a170ff;
            box-shadow: 0 0 10px rgba(161, 112, 255, 0.3);
        }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: #00ffcc;
            border-radius: 50%;
            margin-right: 8px;
            box-shadow: 0 0 8px #00ffcc;
        }

        .timestamp-text {
            font-size: 13px;
            color: #8c8ca3;
        }
    </style>
</head>
<body>

    <div class="bg-wrapper">
        <div class="aurora"></div>
    </div>

    <div class="content-wrapper">
        <header>
            <!-- Sinkronisasi Element Glitch Persis Atribut NontonYuk -->
            <h1 data-text="JayenTracker">JayenTracker</h1>
        </header>
        
        <table>
            <thead>
                <tr>
                    <th>👤 Player Name</th>
                    <th>
                        <div class="header-align">
                            <img class="evo-header-logo" src="https://github.com/jayenbuddy/tracker/blob/main/EVO.png?raw=true" alt="Evolved Stone">
                            <span>Evolved Enchant Stone</span>
                        </div>
                    </th>
                    <th>🕒 Last Modified</th>
                    <th>🔄 Last Sync</th>
                </tr>
            </thead>
            <tbody id="accountTableBody">
                <tr>
                    <td colspan="4" style="text-align: center; color: #5c5c7a; padding: 25px;">Menunggu data executor...</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script>
        let trackerState = {};

        function formatElapsedTime(pastTime) {
            if (!pastTime) return "-";
            const diffSeconds = Math.floor((new Date() - pastTime) / 1000);
            
            if (diffSeconds < 0) return "Just now";
            if (diffSeconds < 5) return "Just now";
            if (diffSeconds < 60) return `${diffSeconds} sec ago`;
            
            const diffMinutes = Math.floor(diffSeconds / 60);
            return `${diffMinutes} min ago`;
        }

        async function fetchMultiData() {
            try {
                const response = await fetch('/api/update-stone');
                const database = await response.json();
                
                const tbody = document.getElementById('accountTableBody');
                if (Object.keys(database).length === 0) return;
                
                tbody.innerHTML = "";
                
                for (const userId in database) {
                    const account = database[userId];
                    const currentStoneCount = Number(account.totalStone);
                    const currentRawTimestamp = account.timestamp;
                    const now = new Date();

                    if (!trackerState[userId]) {
                        trackerState[userId] = {
                            lastStoneValue: currentStoneCount,
                            lastRawSyncTime: currentRawTimestamp,
                            modifiedRealDate: now,
                            syncRealDate: now
                        };
                    } else {
                        // AKURAT: Last Modified HANYA berubah jika nilai batu bertambah/berkurang
                        if (trackerState[userId].lastStoneValue !== currentStoneCount) {
                            trackerState[userId].lastStoneValue = currentStoneCount;
                            trackerState[userId].modifiedRealDate = now;
                        }
                        
                        // Last Sync berubah setiap ada payload data baru dari server/executor
                        if (trackerState[userId].lastRawSyncTime !== currentRawTimestamp) {
                            trackerState[userId].lastRawSyncTime = currentRawTimestamp;
                            trackerState[userId].syncRealDate = now;
                        }
                    }

                    const displayModified = formatElapsedTime(trackerState[userId].modifiedRealDate);
                    const displaySync = formatElapsedTime(trackerState[userId].syncRealDate);

                    const row = `
                        <tr>
                            <td>
                                <span class="status-dot"></span>
                                <strong>${account.username}</strong>
                            </td>
                            <td>
                                <span class="stone-badge">${currentStoneCount.toLocaleString('id-ID')}</span>
                            </td>
                            <td class="timestamp-text">${displayModified}</td>
                            <td class="timestamp-text">${displaySync}</td>
                        </tr>
                    `;
                    tbody.innerHTML += row;
                }
            } catch (err) {
                console.log("Gagal memuat data API.");
            }
        }

        setInterval(fetchMultiData, 1000);
        fetchMultiData();
    </script>
</body>
</html>
